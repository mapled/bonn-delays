name: GTFS Collect

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    concurrency:
      group: collect
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Collect
        env:
          STOP_IDS: ${{ secrets.STOP_IDS }}
          DATA_DIR: data
        run: |
          curl -sO https://raw.githubusercontent.com/${{ github.repository }}/main/collect.py
          python collect.py

      - name: Commit
        run: |
          git config user.name  "delay-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet && echo "Keine neuen Daten." && exit 0
          git commit -m "data $(date -u +%Y-%m-%dT%H:%M)"
          git push
