name: GTFS-RT Collect

on:
  schedule:
    - cron: '*/5 * * * *'   # alle 5 Minuten
  workflow_dispatch:          # manueller Start zum Testen

jobs:
  collect:
    runs-on: ubuntu-latest
    # Verhindert parallele Runs die in den gleichen CSV schreiben
    concurrency:
      group: gtfs-collect
      cancel-in-progress: false

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r https://raw.githubusercontent.com/${{ github.repository }}/main/requirements.txt

      - name: Collect GTFS-RT
        env:
          GTFS_RT_URL:    ${{ secrets.GTFS_RT_URL }}
          GTFS_RT_API_KEY: ${{ secrets.GTFS_RT_API_KEY }}
          MONITOR_STOPS:  ${{ secrets.MONITOR_STOPS }}
          MONITOR_ROUTES: ${{ secrets.MONITOR_ROUTES }}
          DATA_DIR:       data
        run: |
          curl -sO https://raw.githubusercontent.com/${{ github.repository }}/main/collect.py
          python collect.py

      - name: Commit (nur wenn neue Daten)
        run: |
          git config user.name  "gtfs-bot"
          git config user.email "actions@github.com"
          git add data/
          # Nur committen wenn sich etwas geändert hat
          if git diff --staged --quiet; then
            echo "Keine neuen Daten."
          else
            # Commit-Message enthält Zeilenzahl für schnellen Überblick
            ROWS=$(git diff --staged --stat | grep -oP '\d+(?= insertion)')
            git commit -m "data $(date -u +%Y-%m-%dT%H:%M)  (+${ROWS:-?} rows)"
            git push
          fi
